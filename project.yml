name: PhotoCleaner
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
targets:
  PhotoCleaner:
    type: application
    platform: iOS
    sources:
      - path: PhotoCleaner
        excludes:
          - Assets.xcassets
    resources:
      - PhotoCleaner/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.photocleaner
        INFOPLIST_FILE: PhotoCleaner/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets:
        - PhotoCleanerTests
  PhotoCleanerTests:
    type: bundle.unit-test
    platform: iOS
    hostApplication: PhotoCleaner
    sources:
      - PhotoCleanerTests
    dependencies:
      - target: PhotoCleaner
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.photocleaner.tests
        INFOPLIST_FILE: PhotoCleanerTests/Info.plist

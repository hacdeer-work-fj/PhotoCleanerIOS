name: iOS Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
      P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
      PROVISION_PROFILE_BASE64: ${{ secrets.PROVISION_PROFILE_BASE64 }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Pick available simulator
        run: |
          SIMULATOR_NAME=$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ && /Shutdown/ {gsub(/^[ \t]+|[ \t]+$/, "", $1); print $1; exit}')
          if [ -z "$SIMULATOR_NAME" ]; then
            echo "No available iPhone simulator found"
            xcrun simctl list devices available
            exit 1
          fi
          echo "SIMULATOR_NAME=$SIMULATOR_NAME" >> "$GITHUB_ENV"

      - name: Build without signing
        run: |
          xcodebuild \
            -project PhotoCleaner.xcodeproj \
            -scheme PhotoCleaner \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=$SIMULATOR_NAME" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Test
        run: |
          xcodebuild \
            -project PhotoCleaner.xcodeproj \
            -scheme PhotoCleaner \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=$SIMULATOR_NAME" \
            CODE_SIGNING_ALLOWED=NO \
            test

      - name: Import signing assets
        if: ${{ env.BUILD_CERTIFICATE_BASE64 != '' && env.PROVISION_PROFILE_BASE64 != '' && env.APPLE_TEAM_ID != '' }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          echo -n "$PROVISION_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/build_pp.mobileprovision

      - name: Archive signed app
        if: ${{ env.BUILD_CERTIFICATE_BASE64 != '' && env.PROVISION_PROFILE_BASE64 != '' && env.APPLE_TEAM_ID != '' }}
        run: |
          xcodebuild \
            -project PhotoCleaner.xcodeproj \
            -scheme PhotoCleaner \
            -sdk iphoneos \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/PhotoCleaner.xcarchive" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            archive

      - name: Create export options
        if: ${{ env.BUILD_CERTIFICATE_BASE64 != '' && env.PROVISION_PROFILE_BASE64 != '' && env.APPLE_TEAM_ID != '' }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>teamID</key>
            <string>__APPLE_TEAM_ID__</string>
          </dict>
          </plist>
          PLIST
          sed -i '' "s/__APPLE_TEAM_ID__/$APPLE_TEAM_ID/g" "$RUNNER_TEMP/ExportOptions.plist"

      - name: Export IPA
        if: ${{ env.BUILD_CERTIFICATE_BASE64 != '' && env.PROVISION_PROFILE_BASE64 != '' && env.APPLE_TEAM_ID != '' }}
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/PhotoCleaner.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export"

      - name: Upload IPA
        if: ${{ env.BUILD_CERTIFICATE_BASE64 != '' && env.PROVISION_PROFILE_BASE64 != '' && env.APPLE_TEAM_ID != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: PhotoCleaner-IPA
          path: ${{ runner.temp }}/export/*.ipa
